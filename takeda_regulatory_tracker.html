
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 0; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
.header-left h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.header-left p { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: var(--border-radius-md); }
.badge-info { background: #E6F1FB; color: #0C447C; }
.badge-warning { background: #FAEEDA; color: #633806; }
.badge-danger { background: #FCEBEB; color: #791F1F; }
.badge-success { background: #EAF3DE; color: #27500A; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 13px; color: var(--color-text-secondary); }
select { font-size: 13px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.table-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: var(--color-background-secondary); font-weight: 500; font-size: 12px; color: var(--color-text-secondary); text-align: left; padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
td { padding: 11px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
.product-name { font-weight: 500; }
.product-id { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.progress-bar { height: 5px; border-radius: 99px; background: var(--color-border-tertiary); overflow: hidden; margin-top: 5px; }
.progress-fill { height: 100%; border-radius: 99px; }
.overdue { color: #A32D2D; font-weight: 500; font-size: 12px; }
.on-track { color: #3B6D11; font-size: 12px; }
.col-product { width: 22%; }
.col-cat { width: 14%; }
.col-status { width: 13%; }
.col-review { width: 14%; }
.col-progress { width: 17%; }
.col-owner { width: 12%; }
.col-flag { width: 8%; }
</style>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h2>Regulatory product information tracker</h2>
      <p>Nordic region · Takeda Pharmaceuticals · Q2 2026</p>
    </div>
    <div style="font-size:12px; color:var(--color-text-secondary);">Last updated: 5 Apr 2026</div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total products</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Review due this month</div><div class="metric-value" id="m-due" style="color:#BA7517;">—</div></div>
    <div class="metric"><div class="metric-label">Overdue</div><div class="metric-value" id="m-overdue" style="color:#A32D2D;">—</div></div>
    <div class="metric"><div class="metric-label">Up to date</div><div class="metric-value" id="m-ok" style="color:#3B6D11;">—</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">Filter:</span>
    <select id="f-status" onchange="render()">
      <option value="">All statuses</option>
      <option value="Up to date">Up to date</option>
      <option value="In review">In review</option>
      <option value="Pending update">Pending update</option>
      <option value="Overdue">Overdue</option>
    </select>
    <select id="f-cat" onchange="render()">
      <option value="">All categories</option>
      <option value="Oncology">Oncology</option>
      <option value="Gastro">Gastro</option>
      <option value="Rare disease">Rare disease</option>
      <option value="Neuroscience">Neuroscience</option>
    </select>
    <select id="f-country" onchange="render()">
      <option value="">All markets</option>
      <option value="DK">Denmark</option>
      <option value="NO">Norway</option>
      <option value="SE">Sweden</option>
      <option value="FI">Finland</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-product">Product</th>
          <th class="col-cat">Category</th>
          <th class="col-status">Status</th>
          <th class="col-review">Next review</th>
          <th class="col-progress">Archive completeness</th>
          <th class="col-owner">Market</th>
          <th class="col-flag">Flag</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <p style="font-size:11px; color:var(--color-text-secondary); margin-top:10px;" id="row-count"></p>
</div>

<script>
const data = [
  { id:"TK-0041", name:"Alunbrig 90mg", cat:"Oncology", status:"Up to date", review:"2026-09-12", progress:98, market:"DK", flag:false },
  { id:"TK-0017", name:"Entyvio 300mg", cat:"Gastro", status:"In review", review:"2026-04-30", progress:74, market:"NO", flag:false },
  { id:"TK-0083", name:"Ninlaro 4mg", cat:"Oncology", status:"Overdue", review:"2026-02-15", progress:52, market:"DK", flag:true },
  { id:"TK-0029", name:"Natpara 100mcg", cat:"Rare disease", status:"Pending update", review:"2026-05-08", progress:63, market:"SE", flag:true },
  { id:"TK-0055", name:"Vyvanse 50mg", cat:"Neuroscience", status:"Up to date", review:"2026-11-03", progress:100, market:"FI", flag:false },
  { id:"TK-0062", name:"Trintellix 10mg", cat:"Neuroscience", status:"In review", review:"2026-04-22", progress:81, market:"NO", flag:false },
  { id:"TK-0038", name:"Iclusig 45mg", cat:"Oncology", status:"Overdue", review:"2026-01-30", progress:44, market:"DK", flag:true },
  { id:"TK-0074", name:"Velphoro 500mg", cat:"Rare disease", status:"Up to date", review:"2026-08-19", progress:97, market:"SE", flag:false },
  { id:"TK-0091", name:"Adcetris 50mg", cat:"Oncology", status:"Pending update", review:"2026-05-20", progress:68, market:"NO", flag:false },
  { id:"TK-0012", name:"Dexilant 60mg", cat:"Gastro", status:"Up to date", review:"2026-10-01", progress:95, market:"FI", flag:false },
];

const statusColors = {
  "Up to date": { bg:"#EAF3DE", color:"#27500A" },
  "In review": { bg:"#E6F1FB", color:"#0C447C" },
  "Pending update": { bg:"#FAEEDA", color:"#633806" },
  "Overdue": { bg:"#FCEBEB", color:"#791F1F" },
};

const progressColor = p => p >= 90 ? "#639922" : p >= 65 ? "#BA7517" : "#E24B4A";

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const now = new Date("2026-04-05");
  return Math.round((d - now) / 86400000);
}

function render() {
  const fs = document.getElementById("f-status").value;
  const fc = document.getElementById("f-cat").value;
  const fm = document.getElementById("f-country").value;
  const rows = data.filter(r =>
    (!fs || r.status === fs) &&
    (!fc || r.cat === fc) &&
    (!fm || r.market === fm)
  );

  document.getElementById("m-total").textContent = data.length;
  document.getElementById("m-due").textContent = data.filter(r => { const d = daysUntil(r.review); return d >= 0 && d <= 30; }).length;
  document.getElementById("m-overdue").textContent = data.filter(r => r.status === "Overdue").length;
  document.getElementById("m-ok").textContent = data.filter(r => r.status === "Up to date").length;

  const tbody = document.getElementById("tbody");
  const days_info = r => {
    const d = daysUntil(r.review);
    if (d < 0) return `<span class="overdue">${Math.abs(d)}d overdue</span>`;
    if (d <= 30) return `<span class="overdue">in ${d}d</span>`;
    return `<span class="on-track">in ${d}d</span>`;
  };

  tbody.innerHTML = rows.map(r => {
    const sc = statusColors[r.status];
    const pc = progressColor(r.progress);
    return `<tr>
      <td class="col-product"><div class="product-name">${r.name}</div><div class="product-id">${r.id}</div></td>
      <td class="col-cat">${r.cat}</td>
      <td class="col-status"><span class="badge" style="background:${sc.bg};color:${sc.color};">${r.status}</span></td>
      <td class="col-review">${r.review.slice(0,10)}<br>${days_info(r)}</td>
      <td class="col-progress">
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;">${r.progress}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${r.progress}%;background:${pc};"></div></div>
      </td>
      <td class="col-owner">${r.market}</td>
      <td class="col-flag">${r.flag ? '<span class="badge badge-danger">Flag</span>' : ''}</td>
    </tr>`;
  }).join("");

  document.getElementById("row-count").textContent = `Showing ${rows.length} of ${data.length} products`;
}

render();
</script>
